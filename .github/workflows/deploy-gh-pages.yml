name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev           # triggers on every push to dev
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

# Sets permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Image restoration ──────────────────────────────────────────────────
      # Images are NOT tracked in git (too large). We restore them from the
      # 'images' branch which contains only the public/ image files.
      # This keeps master/dev clean while making images available for the build.
      - name: Restore images from images branch
        run: |
          git fetch origin images --depth=1 2>/dev/null || echo "No images branch yet — skipping image restore"
          if git rev-parse origin/images >/dev/null 2>&1; then
            git checkout origin/images -- public/ 2>/dev/null || echo "No public/ folder on images branch"
            echo "Images restored from images branch"
          fi

      # ── Static export build ───────────────────────────────────────────────
      - name: Build static export
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build

      # next build with output: 'export' creates an 'out/' directory.
      # GitHub Pages requires a .nojekyll file to bypass Jekyll processing.
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
